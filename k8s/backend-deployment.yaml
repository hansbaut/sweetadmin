# backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sweetadmin-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sweetadmin-backend
  template:
    metadata:
      labels:
        app: sweetadmin-backend
    spec:
      containers:
      - name: backend
        image: sweetadmin-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: sweetadmin-backend-svc
spec:
  selector:
    app: sweetadmin-backend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP